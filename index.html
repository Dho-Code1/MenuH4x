<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aim Lock CV</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#050505;
    color:white;
    min-height:100vh;
    overflow:hidden;
}

/* LOADING */

#loadingScreen{
    position:fixed;
    inset:0;
    background:#050505;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.loader-logo{
    width:130px;
    border-radius:30px;
    margin-bottom:25px;
    animation:spin 2s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

.loading-bar{
    width:270px;
    height:14px;
    background:#1c1c1c;
    border-radius:30px;
    overflow:hidden;
    margin-top:15px;
}

.loading-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#ff0055,#00bfff,#00ff88);
    border-radius:30px;
    transition:0.2s;
}

.loading-text{
    margin-top:14px;
    color:#ddd;
    font-size:16px;
    font-weight:bold;
}

/* MAIN */

.container{
    width:92%;
    max-width:430px;
    margin:25px auto;
    background:#121212;
    border-radius:30px;
    overflow:hidden;
    border:1px solid #2a2a2a;
    box-shadow:
    0 0 30px rgba(0,0,0,0.8),
    inset 0 0 10px rgba(255,255,255,0.03);
    display:none;
    animation:showMenu 0.5s ease;
}

@keyframes showMenu{
    from{
        transform:scale(0.9);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

/* HEADER */

.header{
    background:linear-gradient(135deg,#ff004c,#8b00ff);
    padding:20px;
    text-align:center;
    position:relative;
}

.header img{
    width:120px;
    border-radius:30px;
    animation:spin 8s linear infinite;
    box-shadow:0 0 25px #ff0055;
}

.header h1{
    margin-top:12px;
    font-size:28px;
    letter-spacing:1px;
}

.header-icons{
    position:absolute;
    top:15px;
    right:15px;
    font-size:22px;
    display:flex;
    gap:10px;
}

/* LOGIN */

.key-box{
    padding:20px;
    text-align:center;
}

input[type="password"]{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:18px;
    background:#1f1f1f;
    color:white;
    font-size:16px;
}

button{
    position:relative;
    overflow:hidden;
    border:none;
    border-radius:18px;
    padding:15px 20px;
    background:linear-gradient(90deg,#00bfff,#007bff);
    color:white;
    font-weight:bold;
    margin-top:14px;
    cursor:pointer;
    transition:0.25s;
}

button:active{
    transform:scale(0.95);
}

/* RIPPLE */

.ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    animation:ripple 0.6s linear;
    background:rgba(255,255,255,0.5);
}

@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}

/* PANEL */

#panel{
    display:none;
    padding:18px;
}

.tabs{
    display:flex;
    gap:8px;
}

.tab-btn{
    flex:1;
    background:#1d1d1d;
    color:white;
    padding:13px;
    border-radius:16px;
    font-size:14px;
}

.tab-btn.active{
    background:linear-gradient(90deg,#ff0055,#007bff);
}

.content{
    margin-top:16px;
    background:#181818;
    border-radius:24px;
    padding:16px;
    min-height:200px;
    animation:fade 0.3s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.toggle{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#222;
    padding:16px;
    border-radius:18px;
    margin-top:14px;
    box-shadow:0 0 10px rgba(255,255,255,0.03);
}

/* SWITCH */

.switch{
    position:relative;
    display:inline-block;
    width:56px;
    height:30px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    inset:0;
    background:#555;
    border-radius:50px;
    transition:.4s;
}

.slider:before{
    content:"";
    position:absolute;
    height:24px;
    width:24px;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:.4s;
}

input:checked + .slider{
    background:#00d26a;
    box-shadow:0 0 18px #00ff88;
}

input:checked + .slider:before{
    transform:translateX(26px);
}

.success{
    color:#00ff95;
    margin-top:10px;
    font-weight:bold;
}

.error{
    color:#ff3b3b;
    margin-top:10px;
    font-weight:bold;
}

.creator-box{
    text-align:center;
    padding-top:20px;
}

.creator-btn{
    width:100%;
}

input[type="file"]{
    width:100%;
    margin-top:10px;
    color:white;
}

</style>
</head>

<body>

<!-- LOADING -->

<div id="loadingScreen">

    <img src="/mnt/data/6370028C-FE96-49D9-9AD4-0FC4982BAFE7.jpeg"
    class="loader-logo">

    <div class="loading-bar">
        <div class="loading-fill" id="loadingFill"></div>
    </div>

    <div class="loading-text" id="loadingText">
        Loading 0%
    </div>

</div>

<!-- MENU -->

<div class="container" id="mainContainer">

    <div class="header">

        <div class="header-icons">
            ⚙️ 💵
        </div>

        <img src="/mnt/data/6370028C-FE96-49D9-9AD4-0FC4982BAFE7.jpeg">

        <h1>AIM LOCK CV</h1>

    </div>

    <!-- LOGIN -->

    <div class="key-box" id="loginBox">

        <input type="password"
        id="keyInput"
        placeholder="Nhập Key...">

        <button onclick="checkKey()">
            Đăng Nhập
        </button>

    </div>

    <!-- PANEL -->

    <div id="panel">

        <div class="tabs">

            <button class="tab-btn active"
            onclick="showTab('menu',this)">
            Menu
            </button>

            <button class="tab-btn"
            onclick="showTab('file',this)">
            Tài Liệu
            </button>

            <button class="tab-btn"
            onclick="showTab('creator',this)">
            Creator
            </button>

        </div>

        <div class="content" id="content"></div>

    </div>

</div>

<script>

/* LOADING */

let percent = 0;

let interval = setInterval(()=>{

    percent++;

    document.getElementById("loadingFill")
    .style.width = percent + "%";

    document.getElementById("loadingText")
    .innerText = "Loading " + percent + "%";

    if(percent >= 100){

        clearInterval(interval);

        setTimeout(()=>{

            document.getElementById("loadingScreen")
            .style.display = "none";

            document.getElementById("mainContainer")
            .style.display = "block";

        },500);
    }

},30);

/* RIPPLE */

document.addEventListener("click",function(e){

    if(e.target.tagName === "BUTTON"){

        const circle =
        document.createElement("span");

        circle.classList.add("ripple");

        const rect =
        e.target.getBoundingClientRect();

        circle.style.left =
        e.clientX - rect.left + "px";

        circle.style.top =
        e.clientY - rect.top + "px";

        e.target.appendChild(circle);

        setTimeout(()=>{
            circle.remove();
        },600);
    }

});

const KEY = "CV-Azewnx-dbs";

let superEnabled = false;
let aimlockEnabled = false;
let fixloEnabled = false;

/* LOGIN */

function checkKey(){

    let input =
    document.getElementById("keyInput").value;

    if(input === KEY){

        document.getElementById("loginBox")
        .style.display = "none";

        document.getElementById("panel")
        .style.display = "block";

        showTab("menu",
        document.querySelector(".tab-btn"));

    }else{

        alert("❌ Sai Key!");

    }
}

/* TAB */

function showTab(tab,btn){

    document.querySelectorAll(".tab-btn")
    .forEach(x=>x.classList.remove("active"));

    btn.classList.add("active");

    let content =
    document.getElementById("content");

    /* MENU */

    if(tab === "menu"){

        content.innerHTML = `

        <div class="toggle">

            <span>⚡ Super Nhạy</span>

            <label class="switch">

                <input type="checkbox"
                id="super"
                ${superEnabled ? "checked" : ""}>

                <span class="slider"></span>

            </label>

        </div>

        <div class="toggle">

            <span>🎯 AIM LOCK</span>

            <label class="switch">

                <input type="checkbox"
                id="aimlock"
                ${aimlockEnabled ? "checked" : ""}>

                <span class="slider"></span>

            </label>

        </div>

        <div class="toggle">

            <span>🔥 Fix Lố</span>

            <label class="switch">

                <input type="checkbox"
                id="fixlo"
                ${fixloEnabled ? "checked" : ""}>

                <span class="slider"></span>

            </label>

        </div>

        `;

        document.getElementById("super")
        .addEventListener("change",function(){
            superEnabled = this.checked;
        });

        document.getElementById("aimlock")
        .addEventListener("change",function(){
            aimlockEnabled = this.checked;
        });

        document.getElementById("fixlo")
        .addEventListener("change",function(){
            fixloEnabled = this.checked;
        });

    }

    /* FILE */

    else if(tab === "file"){

        content.innerHTML = `

        <input type="file"
        id="fileInput">

        <div id="fileResult"></div>

        `;

        document.getElementById("fileInput")
        .addEventListener("change",function(e){

            let file =
            e.target.files[0];

            if(file){

                if(file.name === "Cv.lock"){

                    document.getElementById("fileResult")
                    .innerHTML =

                    "<div class='success'>✔ Nhập file thành công</div>";

                }else{

                    document.getElementById("fileResult")
                    .innerHTML =

                    "<div class='error'>✖ Chỉ chấp nhận file Cv.lock</div>";

                }
            }

        });

    }

    /* CREATOR */

    else if(tab === "creator"){

        content.innerHTML = `

        <div class="creator-box">

            <h2>👑 Creator</h2>

            <p style="margin-bottom:15px">
            TikTok: @userndd2012
            </p>

            <button class="creator-btn"
            onclick="window.open('https://www.tiktok.com/@userndd2012?_r=1&_t=ZS-96U78JQNOEx')">

            🔑 Lấy Key Free

            </button>

        </div>

        `;
    }
}

</script>

</body>
</html>
