<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aim Lock CV</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    background:linear-gradient(180deg,#050505,#101010);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

/* IOS GLOW */

.bg1,.bg2{
    position:fixed;
    width:250px;
    height:250px;
    border-radius:50%;
    filter:blur(80px);
    z-index:-1;
}

.bg1{
    background:#00bfff;
    top:-50px;
    left:-50px;
}

.bg2{
    background:#ff004c;
    bottom:-50px;
    right:-50px;
}

.container{
    width:92%;
    max-width:420px;
    margin:25px auto;
    background:rgba(25,25,25,0.72);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:28px;
    overflow:hidden;
    box-shadow:
    0 0 30px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.05);
    animation:fade 0.5s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.header{
    background:linear-gradient(90deg,#ff003c,#ff006a);
    padding:20px;
    text-align:center;
    font-size:26px;
    font-weight:700;
    letter-spacing:1px;
}

.key-box{
    padding:20px;
    text-align:center;
}

input[type="password"]{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:16px;
    backdrop-filter:blur(10px);
}

button{
    border:none;
    border-radius:16px;
    padding:14px 20px;
    background:linear-gradient(90deg,#00bfff,#008cff);
    color:white;
    font-weight:bold;
    margin-top:14px;
    cursor:pointer;
    transition:0.25s;
}

button:active{
    transform:scale(0.95);
}

#panel{
    display:none;
    padding:18px;
}

.info{
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:15px;
    margin-bottom:16px;
    font-size:14px;
    line-height:1.7;
    backdrop-filter:blur(10px);
}

.tabs{
    display:flex;
    gap:8px;
}

.tab-btn{
    flex:1;
    background:rgba(255,255,255,0.06);
    color:white;
    padding:12px;
    border-radius:15px;
    font-size:14px;
}

.tab-btn.active{
    background:linear-gradient(90deg,#00bfff,#007bff);
}

.content{
    margin-top:15px;
    background:rgba(255,255,255,0.04);
    border-radius:20px;
    padding:16px;
    min-height:180px;
    animation:fade 0.3s ease;
}

.toggle{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:18px;
    margin-top:12px;
}

/* IOS SWITCH */

.switch{
    position:relative;
    display:inline-block;
    width:54px;
    height:30px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    inset:0;
    background:#555;
    border-radius:50px;
    transition:.4s;
}

.slider:before{
    content:"";
    position:absolute;
    height:24px;
    width:24px;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:.4s;
}

input:checked + .slider{
    background:#00d26a;
    box-shadow:0 0 15px #00ff95;
}

input:checked + .slider:before{
    transform:translateX(24px);
}

.success{
    color:#00ff95;
    margin-top:10px;
    font-weight:bold;
}

.error{
    color:#ff3b3b;
    margin-top:10px;
    font-weight:bold;
}

.creator-box{
    text-align:center;
    padding-top:20px;
}

.creator-box h2{
    margin-bottom:12px;
}

.creator-btn{
    width:100%;
}

</style>
</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<div class="container">

    <div class="header">
        AIM LOCK CV
    </div>

    <!-- LOGIN -->

    <div class="key-box" id="loginBox">

        <input type="password"
        id="keyInput"
        placeholder="Nhập Key...">

        <button onclick="checkKey()">
            Đăng Nhập
        </button>

    </div>

    <!-- PANEL -->

    <div id="panel">

        <div class="info">

            <b>📱 Thông Tin Thiết Bị</b><br><br>

            📱 Thiết bị:
            <span id="device"></span><br>

            🌐 Trình duyệt:
            <span id="browser"></span><br>

            💻 Hệ điều hành:
            <span id="os"></span>

        </div>

        <div class="tabs">

            <button class="tab-btn active"
            onclick="showTab('menu',this)">
            Menu
            </button>

            <button class="tab-btn"
            onclick="showTab('file',this)">
            Tài Liệu
            </button>

            <button class="tab-btn"
            onclick="showTab('creator',this)">
            Creator
            </button>

        </div>

        <div class="content" id="content"></div>

    </div>

</div>

<script>

const KEY = "CV-Azewnx-dbs";

/* LƯU TRẠNG THÁI */

let aimEnabled = false;
let shakeEnabled = false;

/* LOGIN */

function checkKey(){

    let input =
    document.getElementById("keyInput").value;

    if(input === KEY){

        document.getElementById("loginBox")
        .style.display = "none";

        document.getElementById("panel")
        .style.display = "block";

        document.getElementById("device")
        .innerText = navigator.platform;

        document.getElementById("browser")
        .innerText = navigator.appName;

        document.getElementById("os")
        .innerText = navigator.userAgent;

        showTab("menu",
        document.querySelector(".tab-btn"));

    }else{

        alert("❌ Sai Key!");

    }
}

/* TAB */

function showTab(tab,btn){

    document.querySelectorAll(".tab-btn")
    .forEach(x=>x.classList.remove("active"));

    btn.classList.add("active");

    let content =
    document.getElementById("content");

    /* MENU */

    if(tab === "menu"){

        content.innerHTML = `

        <div class="toggle">

            <span>🎯 Nhẹ tâm CV</span>

            <label class="switch">

                <input type="checkbox"
                id="aimlock"
                ${aimEnabled ? "checked" : ""}>

                <span class="slider"></span>

            </label>

        </div>

        <div id="aimText"
        class="success"
        style="display:${aimEnabled ? "block":"none"}">

        ✔ Nhẹ tâm CV đã bật

        </div>

        <div class="toggle">

            <span>📉 Giảm rung 20%</span>

            <label class="switch">

                <input type="checkbox"
                id="shake"
                ${shakeEnabled ? "checked" : ""}>

                <span class="slider"></span>

            </label>

        </div>

        <div id="shakeText"
        class="success"
        style="display:${shakeEnabled ? "block":"none"}">

        ✔ Giảm rung đã bật

        </div>

        `;

        document.getElementById("aimlock")
        .addEventListener("change",function(){

            aimEnabled = this.checked;

            document.getElementById("aimText")
            .style.display =
            this.checked ? "block":"none";

        });

        document.getElementById("shake")
        .addEventListener("change",function(){

            shakeEnabled = this.checked;

            document.getElementById("shakeText")
            .style.display =
            this.checked ? "block":"none";

        });

    }

    /* FILE */

    else if(tab === "file"){

        content.innerHTML = `

        <input type="file"
        id="fileInput">

        <div id="fileResult"></div>

        `;

        document.getElementById("fileInput")
        .addEventListener("change",function(e){

            let file =
            e.target.files[0];

            if(file){

                if(file.name === "Cv.lock"){

                    document.getElementById("fileResult")
                    .innerHTML =

                    "<div class='success'>✔ Nhập file thành công</div>";

                }else{

                    document.getElementById("fileResult")
                    .innerHTML =

                    "<div class='error'>✖ Chỉ chấp thuận khi nhập đúng file</div>";

                }
            }

        });

    }

    /* CREATOR */

    else if(tab === "creator"){

        content.innerHTML = `

        <div class="creator-box">

            <h2>👑 Creator</h2>

            <p style="margin-bottom:15px">
            TikTok: @userndd2012
            </p>

            <button class="creator-btn">
            🔑 Lấy Key Free @userndd2012
            </button>

        </div>

        `;
    }
}

</script>

</body>
</html>
