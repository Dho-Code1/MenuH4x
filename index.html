<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aim Lock CV</title>

<style>
body{
    margin:0;
    padding:0;
    background:#0f0f0f;
    font-family:Arial,sans-serif;
    color:white;
}

.container{
    width:90%;
    max-width:420px;
    margin:30px auto;
    background:#1b1b1b;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 20px #000;
}

.header{
    background:#8b0000;
    padding:18px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.key-box{
    padding:15px;
    text-align:center;
}

input{
    width:85%;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    background:#2c2c2c;
    color:white;
    font-size:15px;
}

button{
    margin-top:12px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00bfff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

#panel{
    display:none;
    padding:15px;
}

.info{
    background:#252525;
    padding:12px;
    border-radius:12px;
    margin-bottom:15px;
    font-size:14px;
}

.tabs{
    display:flex;
    justify-content:space-between;
    gap:8px;
}

.tab-btn{
    flex:1;
    background:#222;
}

.content{
    margin-top:15px;
    background:#151515;
    padding:15px;
    border-radius:15px;
    min-height:120px;
}

.toggle{
    display:flex;
    justify-content:space-between;
    margin-top:12px;
    background:#242424;
    padding:12px;
    border-radius:12px;
}

.success{
    color:#00ff7f;
    margin-top:10px;
}

.error{
    color:red;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        AIM LOCK CV
    </div>

    <div class="key-box" id="loginBox">
        <input type="password" id="keyInput" placeholder="Nhập Key...">
        <br>
        <button onclick="checkKey()">Đăng Nhập</button>
    </div>

    <div id="panel">

        <div class="info">
            <b>Thông Tin Thiết Bị</b><br><br>
            📱 Thiết bị: <span id="device"></span><br>
            🌐 Trình duyệt: <span id="browser"></span><br>
            💻 Hệ điều hành: <span id="os"></span>
        </div>

        <div class="tabs">
            <button class="tab-btn" onclick="showTab('menu')">Menu</button>
            <button class="tab-btn" onclick="showTab('file')">Tài Liệu</button>
            <button class="tab-btn" onclick="showTab('creator')">Creator</button>
        </div>

        <div class="content" id="content">
            Chọn chức năng bên trên
        </div>

    </div>

</div>

<script>

const KEY = "CV-Azewnx-dbs";

function checkKey(){
    let input = document.getElementById("keyInput").value;

    if(input === KEY){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("panel").style.display = "block";

        document.getElementById("device").innerText = navigator.platform;
        document.getElementById("browser").innerText = navigator.appName;
        document.getElementById("os").innerText = navigator.userAgent;
    }else{
        alert("Sai Key!");
    }
}

function showTab(tab){

    let content = document.getElementById("content");

    if(tab === "menu"){
        content.innerHTML = `
            <div class="toggle">
                <span>🎯 Nhẹ tâm CV</span>
                <span>ON</span>
            </div>

            <div class="toggle">
                <span>📉 Giảm rung 20%</span>
                <span>ON</span>
            </div>
        `;
    }

    else if(tab === "file"){
        content.innerHTML = `
            <input type="file" id="fileInput">
            <div id="fileResult"></div>
        `;

        document.getElementById("fileInput").addEventListener("change", function(e){

            let file = e.target.files[0];

            if(file){
                if(file.name === "Cv.lock"){
                    document.getElementById("fileResult").innerHTML =
                    "<div class='success'>✔ Nhập file thành công</div>";
                }else{
                    document.getElementById("fileResult").innerHTML =
                    "<div class='error'>✖ Lỗi: Chỉ chấp nhận file Cv.lock</div>";
                }
            }

        });
    }

    else if(tab === "creator"){
        content.innerHTML = `
            <h3>👑 Creator</h3>
            <p>📱 TikTok: @userndd2012</p>
            <p>🔑 Lấy key free</p>
        `;
    }
}
</script>

</body>
</html>
