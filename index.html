<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aim Lock CV</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#0a0a0a;
    color:white;
    min-height:100vh;
    overflow:hidden;
}

/* LOADING */

#loadingScreen{
    position:fixed;
    inset:0;
    background:#050505;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.loader-logo{
    width:120px;
    margin-bottom:25px;
    border-radius:20px;
}

.loading-bar{
    width:260px;
    height:12px;
    background:#1c1c1c;
    border-radius:20px;
    overflow:hidden;
}

.loading-fill{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#ff004c,#00bfff);
    border-radius:20px;
    transition:0.2s;
}

.loading-text{
    margin-top:12px;
    font-size:15px;
    color:#ccc;
}

/* MAIN */

.container{
    width:92%;
    max-width:420px;
    margin:25px auto;
    background:#131313;
    border-radius:28px;
    overflow:hidden;
    border:1px solid #252525;
    display:none;
}

.header{
    background:linear-gradient(90deg,#ff003c,#ff006a);
    padding:18px;
    text-align:center;
}

.header img{
    width:110px;
    border-radius:20px;
    margin-bottom:10px;
}

.header h1{
    font-size:24px;
}

.key-box{
    padding:20px;
    text-align:center;
}

input[type="password"]{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:16px;
    background:#1f1f1f;
    color:white;
    font-size:16px;
}

button{
    position:relative;
    overflow:hidden;
    border:none;
    border-radius:16px;
    padding:14px 20px;
    background:linear-gradient(90deg,#00bfff,#007bff);
    color:white;
    font-weight:bold;
    margin-top:14px;
    cursor:pointer;
    transition:0.25s;
}

button:active{
    transform:scale(0.96);
}

.ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    animation:ripple 0.6s linear;
    background:rgba(255,255,255,0.5);
}

@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}

#panel{
    display:none;
    padding:18px;
}

.tabs{
    display:flex;
    gap:8px;
}

.tab-btn{
    flex:1;
    background:#1e1e1e;
    color:white;
    padding:12px;
    border-radius:15px;
    font-size:14px;
}

.tab-btn.active{
    background:linear-gradient(90deg,#00bfff,#007bff);
}

.content{
    margin-top:15px;
    background:#181818;
    border-radius:20px;
    padding:16px;
    min-height:180px;
}

.toggle{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#202020;
    padding:15px;
    border-radius:18px;
    margin-top:12px;
}

/* SWITCH */

.switch{
    position:relative;
    display:inline-block;
    width:54px;
    height:30px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    inset:0;
    background:#555;
    border-radius:50px;
    transition:.4s;
}

.slider:before{
    content:"";
    position:absolute;
    height:24px;
    width:24px;
    left:3px;
    top:3px;
    background:white;
    border-radius:50%;
    transition:.4s;
}

input:checked + .slider{
    background:#00d26a;
    box-shadow:0 0 15px #00ff95;
}

input:checked + .slider:before{
    transform:translateX(24px);
}

.success{
    color:#00ff95;
    margin-top:10px;
    font-weight:bold;
}

.error{
    color:#ff3b3b;
    margin-top:10px;
    font-weight:bold;
}

.creator-box{
    text-align:center;
    padding-top:20px;
}

.creator-btn{
    width:100%;
}

input[type="file"]{
    width:100%;
    margin-top:10px;
    color:white;
}

</style>
</head>

<body>

<!-- LOADING -->

<div id="loadingScreen">

    <img src="/mnt/data/6370028C-FE96-49D9-9AD4-0FC4982BAFE7.jpeg"
    class="loader-logo">

    <div class="loading-bar">
        <div class="loading-fill" id="loadingFill"></div>
    </div>

    <div class="loading-text" id="loadingText">
        Loading 0%
    </div>

</div>

<!-- MENU -->

<div class="container" id="mainContainer">

    <div class="header">

        <img src="/mnt/data/6370028C-FE96-49D9-9AD4-0FC4982BAFE7.jpeg">

        <h1>AIM LOCK CV</h1>

    </div>

    <!-- LOGIN -->

    <div class="key-box" id="loginBox">

        <input type="password"
        id="keyInput"
        placeholder="Nhập Key...">

        <button onclick="checkKey()">
            Đăng Nhập
        </button>

    </div>

    <!-- PANEL -->

    <div id="panel">

        <div class="tabs">

            <button class="tab-btn active"
            onclick="showTab('menu',this)">
            Menu
            </button>

            <button class="tab-btn"
            onclick="showTab('file',this)">
            Tài Liệu
            </button>

            <button class="tab-btn"
            onclick="showTab('creator',this)">
            Creator
            </button>

        </div>

        <div class="content" id="content"></div>

    </div>

</div>

<script>

/* LOADING */

let percent = 0;

let interval = setInterval(()=>{

    percent++;

    document.getElementById("loadingFill")
    .style.width = percent + "%";

    document.getElementById("loadingText")
    .innerText = "Loading " + percent + "%";

    if(percent >= 100){

        clearInterval(interval);

        document.getElementById("loadingScreen")
        .style.display = "none";

        document.getElementById("mainContainer")
        .style.display = "block";
    }

},25);

/* RIPPLE EFFECT */

document.addEventListener("click",function(e){

    if(e.target.tagName === "BUTTON"){

        const circle =
        document.createElement("span");

        circle.classList.add("ripple");

        const rect =
        e.target.getBoundingClientRect();

        circle.style.left =
        e.clientX - rect.left + "px";

        circle.style.top =
        e.clientY - rect.top + "px";

        e.target.appendChild(circle);

        setTimeout(()=>{
            circle.remove();
        },600);
    }

});

const KEY = "CV-Azewnx-dbs";

let aimEnabled = false;
let shakeEnabled = false;

/* LOGIN */

function checkKey(){

    let input =
    document.getElementById("keyInput").value;

    if(input === KEY){

        document.getElementById("loginBox")
        .style.display = "none";

        document.getElementById("panel")
        .style.display = "block";

        showTab("menu",
        document.querySelector(".tab-btn"));

    }else{

        alert("❌ Sai Key!");

    }
}

/* TAB */

function showTab(tab,btn){

    document.querySelectorAll(".tab-btn")
    .forEach(x=>x.classList.remove("active"));

    btn.classList.add("active");

    let content =
    document.getElementById("content");

    /* MENU */

    if(tab === "menu"){

        content.innerHTML = `

        <div class="toggle">

            <span>🎯 Nhẹ tâm CV</span>

            <label class="switch">

                <input type="checkbox"
                id="aimlock"
                ${aimEnabled ? "checked" : ""}>

                <span class="slider"></span>

            </label>

        </div>

        <div id="aimText"
        class="success"
        style="display:${aimEnabled ? "block":"none"}">

        ✔ Nhẹ tâm CV đã bật

        </div>

        <div class="toggle">

            <span>📉 Giảm rung 20%</span>

            <label class="switch">

                <input type="checkbox"
                id="shake"
                ${shakeEnabled ? "checked" : ""}>

                <span class="slider"></span>

            </label>

        </div>

        <div id="shakeText"
        class="success"
        style="display:${shakeEnabled ? "block":"none"}">

        ✔ Giảm rung đã bật

        </div>

        `;

        document.getElementById("aimlock")
        .addEventListener("change",function(){

            aimEnabled = this.checked;

            document.getElementById("aimText")
            .style.display =
            this.checked ? "block":"none";

        });

        document.getElementById("shake")
        .addEventListener("change",function(){

            shakeEnabled = this.checked;

            document.getElementById("shakeText")
            .style.display =
            this.checked ? "block":"none";

        });

    }

    /* FILE */

    else if(tab === "file"){

        content.innerHTML = `

        <input type="file"
        id="fileInput">

        <div id="fileResult"></div>

        `;

        document.getElementById("fileInput")
        .addEventListener("change",function(e){

            let file =
            e.target.files[0];

            if(file){

                if(file.name === "Cv.lock"){

                    document.getElementById("fileResult")
                    .innerHTML =

                    "<div class='success'>✔ Nhập file thành công</div>";

                }else{

                    document.getElementById("fileResult")
                    .innerHTML =

                    "<div class='error'>✖ Chỉ chấp thuận khi nhập đúng file</div>";

                }
            }

        });

    }

    /* CREATOR */

    else if(tab === "creator"){

        content.innerHTML = `

        <div class="creator-box">

            <h2>👑 Creator</h2>

            <p style="margin-bottom:15px">
            TikTok: @userndd2012
            </p>

            <button class="creator-btn"
            onclick="window.open('https://www.tiktok.com/@userndd2012?_r=1&_t=ZS-96U78JQNOEx')">

            🔑 Lấy Key Free @userndd2012

            </button>

        </div>

        `;
    }
}

</script>

</body>
</html>
